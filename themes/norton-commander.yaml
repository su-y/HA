Norton Commander:
  ##########################
  # btn.ooo Color Palette  #
  ##########################
  nc-bg: "#0a0a0c"
  nc-bg-card: "#12121a"
  nc-bg-sidebar: "#0e0e14"
  nc-bg-header: "#0a0a0c"
  nc-bg-popup: "#1a1a24"
  nc-border: "#3a3a3c"
  nc-border-bright: "#5a5a5e"
  nc-text: "#b0b0b0"
  nc-text-dim: "#6e6e73"
  nc-text-bright: "#e0e0e0"
  nc-blue: "#5ac8fa"
  nc-green: "#30d158"
  nc-red: "#ff453a"
  nc-orange: "#ff9f0a"
  nc-purple: "#bf5af2"
  nc-cyan: "#64d2ff"
  nc-yellow: "#ffd60a"

  ############################
  # card-mod: Global Styles  #
  ############################
  card-mod-theme: Norton Commander
  card-mod-root: |
    @font-face {
      font-family: 'DOS';
      src: url('/local/fonts/Px437_IBM_VGA.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :host {
      font-family: 'DOS', 'Courier New', monospace !important;
    }
    ha-tabs {
      font-family: 'DOS', 'Courier New', monospace !important;
    }
    app-header {
      border-bottom: 1px solid #3a3a3c !important;
    }
    .toolbar {
      font-family: 'DOS', 'Courier New', monospace !important;
    }
  card-mod-view-yaml: |
    .: |
      hui-view {
        background: #0a0a0c !important;
        font-family: 'DOS', 'Courier New', monospace !important;
      }
  card-mod-card: |
    ha-card {
      font-family: 'DOS', 'Courier New', monospace !important;
      border: 1px solid #3a3a3c !important;
      border-radius: 0px !important;
      box-shadow: none !important;
      overflow: hidden;
    }
    ha-card .card-header {
      font-family: 'DOS', 'Courier New', monospace !important;
      font-size: 14px !important;
      letter-spacing: 1px !important;
      text-transform: uppercase !important;
      padding: 12px 16px 8px !important;
    }
    /* ═══ Square toggle switches ═══ */
    ha-switch {
      --mdc-switch-selected-handle-color: #30d158 !important;
      --mdc-switch-selected-track-color: #1a3a1a !important;
      --mdc-switch-unselected-handle-color: #5a5a5e !important;
      --mdc-switch-unselected-track-color: #1a1a1e !important;
      --mdc-switch-handle-shape: 0px !important;
      --mdc-switch-track-shape: 0px !important;
    }
    /* Fallback for older HA switch */
    ha-switch .mdc-switch {
      border-radius: 0 !important;
    }
    ha-switch .mdc-switch__track {
      border-radius: 0 !important;
      border: 1px solid #3a3a3c !important;
    }
    ha-switch .mdc-switch__handle-track {
      border-radius: 0 !important;
    }
    ha-switch .mdc-switch__handle {
      border-radius: 0 !important;
    }
    ha-switch .mdc-switch__shadow {
      border-radius: 0 !important;
    }
    ha-switch .mdc-switch__ripple {
      display: none !important;
    }
    /* ═══ Square buttons ═══ */
    mwc-button, ha-button, md-filled-button, md-outlined-button {
      --mdc-shape-small: 0px !important;
      border-radius: 0 !important;
      font-family: 'DOS', 'Courier New', monospace !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
    }
    mwc-button .mdc-button {
      border-radius: 0 !important;
    }
    /* ═══ Square sliders ═══ */
    ha-slider, ha-bar-slider {
      --md-slider-handle-shape: 0px !important;
      --md-slider-active-track-shape: 0px !important;
      --md-slider-inactive-track-shape: 0px !important;
      border-radius: 0 !important;
    }
    ha-slider .mdc-slider__thumb-knob {
      border-radius: 0 !important;
      border: 2px solid #5ac8fa !important;
      background: #0a0a0c !important;
    }
    ha-slider .mdc-slider__track--active_fill {
      border-radius: 0 !important;
    }
    ha-slider .mdc-slider__track--inactive {
      border-radius: 0 !important;
    }
    ha-bar-slider {
      --control-slider-border-radius: 0px !important;
    }
    /* ═══ Square chips / badges ═══ */
    ha-chip, ha-label-badge {
      border-radius: 0 !important;
      --ha-chip-border-radius: 0px !important;
    }
    ha-label-badge .badge-container {
      border-radius: 0 !important;
    }
    ha-state-icon {
      --mdc-icon-size: 20px;
    }
    /* ═══ Square dialogs ═══ */
    ha-dialog {
      --mdc-dialog-box-shadow: none !important;
      --mdc-shape-medium: 0px !important;
      --ha-dialog-border-radius: 0px !important;
    }
    ha-dialog .mdc-dialog__surface {
      border-radius: 0 !important;
      border: 1px solid #3a3a3c !important;
    }
    /* ═══ Square select menus ═══ */
    ha-select, mwc-select {
      --mdc-shape-small: 0px !important;
      border-radius: 0 !important;
    }
    ha-select .mdc-select {
      border-radius: 0 !important;
    }
    /* ═══ Square text fields ═══ */
    ha-textfield, mwc-textfield {
      --mdc-shape-small: 0px !important;
      border-radius: 0 !important;
      font-family: 'DOS', 'Courier New', monospace !important;
    }
    /* ═══ Entity rows ═══ */
    hui-generic-entity-row {
      font-family: 'DOS', 'Courier New', monospace !important;
    }
    .secondary {
      font-family: 'DOS', 'Courier New', monospace !important;
    }
    /* ═══ Kill all remaining border radius ═══ */
    * {
      --ha-card-border-radius: 0px !important;
      --mdc-shape-small: 0px !important;
      --mdc-shape-medium: 0px !important;
    }
    /* ═══ Kill ripple effects (too material) ═══ */
    mwc-ripple, md-ripple {
      display: none !important;
    }
    /* ═══ Tile card controls ═══ */
    ha-tile-slider {
      --control-slider-border-radius: 0px !important;
    }
    ha-tile-icon {
      --tile-icon-border-radius: 0px !important;
    }
    ha-tile-badge {
      border-radius: 0 !important;
    }
    /* ═══ More-info dialog ═══ */
    ha-more-info-dialog {
      --ha-dialog-border-radius: 0px !important;
    }
    /* ═══ Scrollbar styling ═══ */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0c;
    }
    ::-webkit-scrollbar-thumb {
      background: #3a3a3c;
      border-radius: 0;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #5a5a5e;
    }

  ################
  # Primary      #
  ################
  primary-color: var(--nc-blue)
  accent-color: var(--nc-orange)
  primary-text-color: var(--nc-text)
  secondary-text-color: var(--nc-text-dim)
  text-primary-color: var(--nc-text-bright)

  ################
  # Background   #
  ################
  primary-background-color: var(--nc-bg)
  secondary-background-color: var(--nc-bg-card)
  card-background-color: var(--nc-bg-card)
  ha-card-background: var(--nc-bg-card)

  ################
  # Header       #
  ################
  app-header-background-color: var(--nc-bg-header)
  app-header-text-color: var(--nc-blue)
  app-header-selection-bar-color: var(--nc-orange)

  ################
  # Sidebar      #
  ################
  sidebar-background-color: var(--nc-bg-sidebar)
  sidebar-text-color: var(--nc-text)
  sidebar-icon-color: var(--nc-text-dim)
  sidebar-selected-background-color: var(--nc-bg-card)
  sidebar-selected-icon-color: var(--nc-blue)
  sidebar-selected-text-color: var(--nc-blue)

  ################
  # Cards        #
  ################
  ha-card-border-color: var(--nc-border)
  ha-card-border-radius: "0px"
  ha-card-border-width: "1px"
  ha-card-box-shadow: "none"
  ha-card-header-font-size: "14px"
  ha-card-header-color: var(--nc-orange)

  ################
  # Buttons      #
  ################
  mdc-button-outline-color: var(--nc-border)
  mdc-theme-primary: var(--nc-blue)

  ################
  # Switches     #
  ################
  switch-checked-color: var(--nc-green)
  switch-checked-button-color: var(--nc-green)
  switch-checked-track-color: "#1a3a1a"
  switch-unchecked-color: var(--nc-text-dim)
  switch-unchecked-button-color: var(--nc-border-bright)
  switch-unchecked-track-color: "#1a1a1e"

  ################
  # Sliders      #
  ################
  paper-slider-knob-color: var(--nc-blue)
  paper-slider-active-color: var(--nc-blue)
  paper-slider-container-color: var(--nc-border)

  ################
  # Toggles      #
  ################
  paper-toggle-button-checked-bar-color: var(--nc-green)
  paper-toggle-button-checked-button-color: var(--nc-green)
  paper-toggle-button-unchecked-bar-color: var(--nc-border)
  paper-toggle-button-unchecked-button-color: var(--nc-border-bright)

  ################
  # Table        #
  ################
  table-row-background-color: var(--nc-bg-card)
  table-row-alternative-background-color: var(--nc-bg)
  data-table-background-color: var(--nc-bg-card)
  markdown-code-background-color: var(--nc-bg)

  ################
  # Dialogs      #
  ################
  dialog-background-color: var(--nc-bg-popup)
  dialog-backdrop-color: "rgba(0, 0, 0, 0.7)"

  ################
  # Inputs       #
  ################
  input-fill-color: var(--nc-bg)
  input-ink-color: var(--nc-text)
  input-label-ink-color: var(--nc-text-dim)
  input-disabled-fill-color: var(--nc-bg)
  input-disabled-ink-color: var(--nc-text-dim)
  input-dropdown-icon-color: var(--nc-text-dim)
  input-idle-line-color: var(--nc-border)
  input-hover-line-color: var(--nc-blue)

  ################
  # Labels       #
  ################
  label-badge-background-color: var(--nc-bg-card)
  label-badge-text-color: var(--nc-text)
  label-badge-red: var(--nc-red)
  label-badge-green: var(--nc-green)
  label-badge-blue: var(--nc-blue)
  label-badge-yellow: var(--nc-yellow)

  ################
  # States       #
  ################
  state-icon-color: var(--nc-text-dim)
  state-icon-active-color: var(--nc-blue)
  state-icon-unavailable-color: var(--nc-border)
  state-on-color: var(--nc-green)
  state-off-color: var(--nc-text-dim)
  state-active-color: var(--nc-blue)

  ################
  # Severity     #
  ################
  error-color: var(--nc-red)
  warning-color: var(--nc-orange)
  success-color: var(--nc-green)
  info-color: var(--nc-blue)

  ################
  # Disabled     #
  ################
  disabled-color: var(--nc-border)
  disabled-text-color: var(--nc-text-dim)

  ################
  # Dividers     #
  ################
  divider-color: var(--nc-border)

  ################
  # Scrollbar    #
  ################
  scrollbar-thumb-color: var(--nc-border-bright)

  ################
  # Code Editor  #
  ################
  code-editor-background-color: var(--nc-bg)
  codemirror-keyword: var(--nc-purple)
  codemirror-operator: var(--nc-text)
  codemirror-variable: var(--nc-blue)
  codemirror-variable-2: var(--nc-cyan)
  codemirror-def: var(--nc-orange)
  codemirror-tag: var(--nc-red)
  codemirror-string: var(--nc-green)
  codemirror-string-2: var(--nc-green)
  codemirror-comment: var(--nc-text-dim)
  codemirror-number: var(--nc-orange)
  codemirror-atom: var(--nc-purple)
  codemirror-meta: var(--nc-text-dim)
  codemirror-builtin: var(--nc-cyan)
  codemirror-qualifier: var(--nc-yellow)
  codemirror-attribute: var(--nc-orange)
  codemirror-property: var(--nc-blue)

  ################
  # Graphs       #
  ################
  graph-color-1: var(--nc-blue)
  graph-color-2: var(--nc-green)
  graph-color-3: var(--nc-orange)
  graph-color-4: var(--nc-purple)
  graph-color-5: var(--nc-red)
  graph-color-6: var(--nc-cyan)

  ################
  # Energy       #
  ################
  energy-grid-consumption-color: var(--nc-blue)
  energy-grid-return-color: var(--nc-green)
  energy-solar-color: var(--nc-orange)
  energy-battery-in-color: var(--nc-purple)
  energy-battery-out-color: var(--nc-cyan)
  energy-gas-color: var(--nc-red)
  energy-water-color: var(--nc-blue)

  ################
  # Map          #
  ################
  map-filter: "invert(0.9) hue-rotate(180deg) brightness(0.6) contrast(3)"

  ################
  # Chip / Badge #
  ################
  ha-chip-background-color: var(--nc-bg)
  ha-chip-text-color: var(--nc-text)
  ha-chip-border-color: var(--nc-border)
